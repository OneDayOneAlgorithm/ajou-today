<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Line Duel</title>
    <link rel="stylesheet" href="/lineduel/style.css">
</head>
<body>
<div class="container">
    <h1>Line Duel</h1>
    <p class="subtitle">누구나 바로 이해하는 1대1 카드 전투</p>

    <div class="lobby">
        <button onclick="createRoom()">방 만들기</button>

        <div class="join-box">
            <input id="joinGameId" placeholder="방 코드 입력 예: A8K2QF">
            <button onclick="joinRoom()">방 입장</button>
        </div>
    </div>

    <div id="roomInfo" class="room-info hidden">
        <p>
            방 코드:
            <strong id="gameIdText"></strong>
            <button class="copy-button" onclick="copyRoomCode()">복사</button>
        </p>
        <p>내 플레이어: <strong id="myPlayerText"></strong></p>
        <p id="copyMessage" class="copy-message"></p>
        <p id="waitingText"></p>
    </div>

    <div id="game" class="game hidden">
        <div id="resultPanel" class="result-panel hidden">
            <h2 id="resultTitle">게임 종료</h2>
            <p id="resultMessage"></p>
            <div class="result-buttons">
                <button onclick="createRoom()">새 게임 만들기</button>
                <button class="secondary-button" onclick="goToLobby()">로비로 돌아가기</button>
            </div>
        </div>

        <div class="action-panel">
            <p id="selectedCardText">선택한 카드: 없음</p>
            <button id="submitCardButton" onclick="submitSelectedCard()" disabled>
                선택한 카드 제출
            </button>
        </div>

        <div class="status">
            <span id="turn"></span>
            <span id="winner"></span>
        </div>

        <div class="board">
            <section class="player enemy">
                <h2>Player 2</h2>
                <p>HP: <span id="p2Hp"></span> / Mana: <span id="p2Mana"></span></p>
                <div id="p2Field" class="field"></div>
                <h3>Player 2 손패</h3>
                <div id="p2Hand" class="hand"></div>
            </section>

            <section class="log">
                <h3>전투 로그</h3>
                <ul id="logs"></ul>
            </section>

            <section class="player me">
                <h2>Player 1</h2>
                <p>HP: <span id="p1Hp"></span> / Mana: <span id="p1Mana"></span></p>
                <div id="p1Field" class="field"></div>
                <h3>Player 1 손패</h3>
                <div id="p1Hand" class="hand"></div>
            </section>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script src="/lineduel/app.js"></script>
</body>
</html>
