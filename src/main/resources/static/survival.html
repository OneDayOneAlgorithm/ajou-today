<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Ajou Survival: Power Up</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; color: white; text-align: center; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        canvas { display: block; margin: 10px auto; border: 4px solid #442200; border-radius: 10px; cursor: crosshair; }
        #ui-panel { margin-top: 5px; font-size: 20px; font-weight: bold; }
        .hp { color: #ff4444; }
        .score { color: #ffff44; }
        #leaderboard {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9); padding: 20px; border: 2px solid #ffff44;
            border-radius: 15px; display: none; min-width: 300px; z-index: 100;
        }
        #leaderboard h2 { color: #ffff44; margin-top: 0; }
        #score-list { list-style: none; padding: 0; text-align: left; margin-bottom: 20px; }
        #score-list li { padding: 8px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        .btn-restart { background: #ffff44; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<h1>💧 Ajou Survival : 파워업 모드</h1>

<div id="ui-panel">
    ❤️ HP: <span id="hp" class="hp">100</span> |
    💀 SCORE: <span id="score" class="score">0</span>
</div>

<div id="leaderboard">
    <h2>🏆 명예의 전당 (Top 10)</h2>
    <ul id="score-list"></ul>
    <button class="btn-restart" onclick="location.reload()">다시 도전하기</button>
</div>

<script>
    const config = {
        type: Phaser.AUTO, width: 800, height: 600, backgroundColor: '#1a1a1a',
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player, tears, enemies, items, wasd;
    let hp = 100, score = 0, lastFired = 0;
    let isGameOver = false;
    let gameToken = "";

    // 💡 [신규] 기본 연사 속도 (200ms = 0.2초)
    let fireRate = 200;

    let startTime = 0;
    let nextSpawnTime = 0;
    let spawnDelay = 1500;

    window.onload = async function() {
        try {
            const response = await fetch('/api/scores/start');
            gameToken = await response.text();
        } catch (e) { console.error("입장권 발급 실패:", e); }
    };

    function preload() {
        let g = this.make.graphics({x: 0, y: 0, add: false});
        g.fillStyle(0x00ff00); g.fillRect(0, 0, 30, 30); g.generateTexture('player', 30, 30); g.clear();
        g.fillStyle(0xff0000); g.fillRect(0, 0, 30, 30); g.generateTexture('enemy', 30, 30); g.clear();
        g.fillStyle(0x00ffff); g.fillCircle(10, 10, 10); g.generateTexture('tear', 20, 20); g.clear();
        g.fillStyle(0x800080); g.fillRect(0, 0, 60, 60); g.generateTexture('boss', 60, 60); g.clear();

        // 아이템 텍스처
        g.fillStyle(0xff66cc); g.fillCircle(10, 10, 10); g.generateTexture('potion', 20, 20); g.clear(); // 체력 회복(분홍 동그라미)
        g.fillStyle(0xffff00); g.fillRect(0, 0, 20, 20); g.generateTexture('speedUp', 20, 20); g.clear(); // 공속 강화(노란 네모)
    }

    function create() {
        player = this.physics.add.sprite(400, 300, 'player');
        player.setCollideWorldBounds(true);
        tears = this.physics.add.group();
        enemies = this.physics.add.group();
        items = this.physics.add.group();

        wasd = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.W, down: Phaser.Input.Keyboard.KeyCodes.S,
            left: Phaser.Input.Keyboard.KeyCodes.A, right: Phaser.Input.Keyboard.KeyCodes.D
        });

        this.physics.add.overlap(tears, enemies, hitEnemy, null, this);
        this.physics.add.collider(player, enemies, hitPlayer, null, this);
        // 💡 [수정] getPotion 대신 공용 getItem 함수로 변경
        this.physics.add.overlap(player, items, getItem, null, this);

        startTime = this.time.now;
        nextSpawnTime = startTime + spawnDelay;
    }

    function update(time, delta) {
        if (isGameOver) return;

        player.setVelocity(0);
        if (wasd.left.isDown) player.setVelocityX(-250);
        else if (wasd.right.isDown) player.setVelocityX(250);
        if (wasd.up.isDown) player.setVelocityY(-250);
        else if (wasd.down.isDown) player.setVelocityY(250);

        let pointer = this.input.activePointer;
        if (time > lastFired) {
            let angle = Phaser.Math.Angle.Between(player.x, player.y, pointer.x, pointer.y);
            let tear = tears.create(player.x, player.y, 'tear');
            tear.setVelocity(Math.cos(angle) * 400, Math.sin(angle) * 400);
            this.time.delayedCall(1500, () => { if (tear.active) tear.destroy(); });

            // 💡 [핵심] 고정된 200이 아니라 변수 fireRate 사용!
            lastFired = time + fireRate;
        }

        let elapsedSeconds = (time - startTime) / 1000;

        if (time > nextSpawnTime) {
            spawnEnemy();
            spawnDelay = Math.max(200, 1500 - (elapsedSeconds * 130));
            nextSpawnTime = time + spawnDelay;
        }

        enemies.getChildren().forEach(enemy => {
            let speedBonus = elapsedSeconds * 13;
            let speed = enemy.isBoss ? (70 + speedBonus * 0.5) : (110 + speedBonus);
            this.physics.moveToObject(enemy, player, speed);
        });
    }

    function spawnEnemy() {
        if (isGameOver) return;
        let x, y;
        do { x = Phaser.Math.Between(50, 750); y = Phaser.Math.Between(50, 550); }
        while (Phaser.Math.Distance.Between(player.x, player.y, x, y) < 200);

        let isBoss = Phaser.Math.Between(1, 10) === 1;
        let enemy = enemies.create(x, y, isBoss ? 'boss' : 'enemy');
        enemy.setCollideWorldBounds(true);
        enemy.isBoss = isBoss;
        enemy.hp = isBoss ? 5 : 1;
    }

    function hitEnemy(tear, enemy) {
        tear.destroy();
        enemy.hp -= 1;

        if (enemy.hp <= 0) {
            enemy.destroy();
            score += enemy.isBoss ? 5 : 1;
            document.getElementById('score').innerText = score;

            // 💡 [아이템 드롭 확률 조정]
            // 15% 확률로 포션, 10% 확률로 공속 강화 아이템 드롭
            let dropChance = Phaser.Math.Between(1, 100);
            if (dropChance <= 15) {
                items.create(enemy.x, enemy.y, 'potion');
            } else if (dropChance <= 25) {
                items.create(enemy.x, enemy.y, 'speedUp'); // 공속 강화 아이템!
            }
        } else {
            enemy.setTintFill(0xffffff);
            this.time.delayedCall(100, () => {
                if (enemy && enemy.active) enemy.clearTint();
            });
        }
    }

    // 💡 [신규] 아이템 획득 로직 통합
    function getItem(player, item) {
        let itemType = item.texture.key; // 어떤 아이템인지 확인
        item.destroy(); // 화면에서 아이템 삭제

        if (itemType === 'potion') {
            // 체력 20 회복 (최대 100)
            hp = Math.min(hp + 20, 100);
            document.getElementById('hp').innerText = hp;
            this.cameras.main.flash(200, 0, 255, 0); // 초록색 번쩍임
        }
        else if (itemType === 'speedUp') {
            // 💡 연사 속도 20ms 감소 (최대 50ms까지만 빨라지도록 제한)
            fireRate = Math.max(50, fireRate - 20);
            this.cameras.main.flash(200, 255, 255, 0); // 노란색 번쩍임 (파워업 효과)
        }
    }

    function hitPlayer(player, enemy) {
        let knockbackX = (player.x - enemy.x) * 3;
        let knockbackY = (player.y - enemy.y) * 3;
        player.setVelocity(knockbackX, knockbackY);

        let damage = enemy.isBoss ? 20 : 10;
        hp -= damage;
        document.getElementById('hp').innerText = Math.max(hp, 0);

        this.cameras.main.flash(200, 255, 0, 0);
        this.cameras.main.shake(150, 0.02);

        if (hp <= 0 && !isGameOver) {
            isGameOver = true;
            this.physics.pause();
            player.setTint(0xff0000);

            let survivedSeconds = Math.floor((this.time.now - startTime) / 1000);
            handleGameOver(score, survivedSeconds);
        }
    }

    async function handleGameOver(finalScore, survivedSeconds) {
        if (!gameToken) {
            alert("❌ 게임 입장권이 유실되었거나 비정상적인 접근입니다.");
            return location.reload();
        }

        let msg = "";
        if (survivedSeconds < 5) msg = `[⏱️ ${survivedSeconds}초 생존] 입구컷 당하셨습니다... 게임 시작은 하신 거 맞죠? 😅`;
        else if (survivedSeconds < 10) msg = `[⏱️ ${survivedSeconds}초 생존] 지하실의 먼지가 되었습니다. 아직 손가락이 덜 풀렸군요!`;
        else if (survivedSeconds < 15) msg = `[⏱️ ${survivedSeconds}초 생존] 지옥의 맛을 살짝 보셨군요. 10초의 벽은 꽤 높습니다!`;
        else if (survivedSeconds < 20) msg = `[⏱️ ${survivedSeconds}초 생존] 제법입니다! 몬스터들이 당신의 무빙에 당황하기 시작했습니다.`;
        else if (survivedSeconds < 25) msg = `[⏱️ ${survivedSeconds}초 생존] 20초 돌파! 진정한 생존의 의미를 깨달으셨군요.`;
        else if (survivedSeconds < 30) msg = `[⏱️ ${survivedSeconds}초 생존] 피지컬이 예사롭지 않습니다. 지하실의 중간 보스급이네요!`;
        else if (survivedSeconds < 35) msg = `[⏱️ ${survivedSeconds}초 생존] 30초의 벽을 넘다니... 당신의 동체 시력에 경의를 표합니다.`;
        else if (survivedSeconds < 40) msg = `[⏱️ ${survivedSeconds}초 생존] 고인물의 냄새가 납니다. 혹시 뱀파이어 서바이버 장인이신가요?`;
        else if (survivedSeconds < 45) msg = `[⏱️ ${survivedSeconds}초 생존] 몬스터 학살자 칭호를 획득하셨습니다. 혹시 AI 아니신가요? 🤖`;
        else if (survivedSeconds < 50) msg = `[⏱️ ${survivedSeconds}초 생존] 전설로 남을 기록입니다! 50초가 코앞이었는데 정말 아깝네요!`;
        else msg = `[⏱️ ${survivedSeconds}초 생존] 🏆 신의 경지에 도달하셨습니다! 이 미친 난이도를 50초 이상 버티다니!`;

        alert(msg);

        const playerName = prompt("명예의 전당에 등록할 닉네임을 입력하세요:", "무명용사");
        if (!playerName) return location.reload();

        try {
            const response = await fetch('/api/scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + gameToken },
                body: JSON.stringify({ playerName: playerName, score: finalScore })
            });

            if (response.ok) showLeaderboard();
            else { alert(await response.text()); location.reload(); }
        } catch (e) { console.error("점수 저장 실패:", e); }
    }

    async function showLeaderboard() {
        try {
            const response = await fetch('/api/scores/top');
            const topScores = await response.json();
            const list = document.getElementById('score-list');
            list.innerHTML = "";
            topScores.forEach((s, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${index + 1}위. <b>${s.playerName}</b></span> <span>${s.score} 킬</span>`;
                list.appendChild(li);
            });
            document.getElementById('leaderboard').style.display = 'block';
        } catch (e) { console.error("랭킹 로드 실패:", e); }
    }
</script>
</body>
</html>
