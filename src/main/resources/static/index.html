<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajou Today 메인 포털</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Gowun Dodum', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white; text-align: center;
        }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.2rem; margin-bottom: 40px; color: #d1d8e0; }
        .menu-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;}
        .menu-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 30px 40px; border-radius: 15px; text-decoration: none; color: white;
            font-size: 1.5rem; font-weight: bold; border: 2px solid transparent;
            transition: all 0.3s ease; width: 200px;
        }
        .menu-card:hover {
            background: rgba(255, 255, 255, 0.2); transform: translateY(-5px);
            border: 2px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
<h1>Ajou.Today</h1>
<p>당신의 하루를 채우는 작은 즐거움</p>

<div class="menu-container">
    <a href="/quote" class="menu-card">📜 오늘의 명언</a>
    <a href="/game" class="menu-card">🍄 티모 잡기 게임</a>
</div>
</body>
</html>
