<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티모 버섯 잡기</title>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            font-family: 'Gowun Dodum', sans-serif;
            background-color: #2d3436; color: white;
        }
        .header { margin-top: 20px; text-align: center; }
        .score-board { font-size: 1.5rem; margin: 10px 0; color: #00cec9; }

        #game-board {
            width: 90%; max-width: 600px; height: 350px;
            background-color: #55efc4; border: 5px solid #00b894;
            border-radius: 15px; position: relative; overflow: hidden;
            cursor: crosshair; margin-bottom: 20px;
        }
        #teemo {
            font-size: 40px; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            user-select: none; display: none; cursor: pointer;
        }
        .btn {
            background-color: #0984e3; color: white; border: none;
            padding: 10px 20px; font-size: 1.2rem; border-radius: 8px; cursor: pointer;
        }
        .btn:hover { background-color: #74b9ff; }

        /* 🏆 명예의 전당 스타일 */
        .ranking-container {
            background: rgba(255, 255, 255, 0.1); padding: 20px;
            border-radius: 10px; width: 90%; max-width: 400px; margin-bottom: 20px;
        }
        .ranking-container h2 { margin-top: 0; text-align: center; color: #fdcb6e; }
        .ranking-list { list-style: none; padding: 0; margin: 0; }
        .ranking-list li {
            display: flex; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .ranking-list li:last-child { border-bottom: none; }
        .back-link { margin-bottom: 30px; color: #b2bec3; text-decoration: none; }
    </style>
</head>
<body>
<div class="header">
    <h1>🍄 티모 버섯 잡기 🍄</h1>
    <div class="score-board">점수: <span id="score">0</span> | 남은 시간: <span id="time">15</span>초</div>
    <button class="btn" onclick="startGame()">게임 시작</button>
</div>

<div id="game-board">
    <div id="teemo" onclick="catchTeemo()">🍄</div>
</div>

<div class="ranking-container">
    <h2>🏆 명예의 전당 (Top 5)</h2>
    <ul class="ranking-list" id="rankingList">
        <li>로딩 중...</li>
    </ul>
</div>

<a href="/" class="back-link">⬅️ 메인으로 돌아가기</a>

<script>
    let score = 0;
    let timeLeft = 15;
    let gameInterval, moveInterval;
    let isPlaying = false;

    const teemo = document.getElementById('teemo');
    const scoreDisplay = document.getElementById('score');
    const timeDisplay = document.getElementById('time');
    const board = document.getElementById('game-board');

    // 1. 서버에서 랭킹을 가져와서 화면에 그리는 함수
    async function loadRanking() {
        try {
            const response = await fetch('/api/scores/top');
            const scores = await response.json();
            const rankingList = document.getElementById('rankingList');

            rankingList.innerHTML = ''; // 기존 목록 비우기

            if (scores.length === 0) {
                rankingList.innerHTML = '<li>아직 랭킹이 없습니다. 1등에 도전하세요!</li>';
                return;
            }

            scores.forEach((s, index) => {
                const li = document.createElement('li');
                let medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `${index + 1}위`;
                li.innerHTML = `<span>${medal} ${s.playerName}</span> <span>${s.score}점</span>`;
                rankingList.appendChild(li);
            });
        } catch (error) {
            console.error("랭킹 로드 실패:", error);
        }
    }

    // 페이지 열리자마자 랭킹 1번 불러오기
    window.onload = loadRanking;

    function startGame() {
        if (isPlaying) return;
        isPlaying = true;
        score = 0; timeLeft = 15;
        scoreDisplay.innerText = score; timeDisplay.innerText = timeLeft;
        teemo.style.display = 'block';

        gameInterval = setInterval(() => {
            timeLeft--;
            timeDisplay.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);

        moveTeemo();
        moveInterval = setInterval(moveTeemo, 700); // 0.7초마다 이동 (난이도 살짝 상승!)
    }

    function moveTeemo() {
        const maxX = board.clientWidth - 50;
        const maxY = board.clientHeight - 50;
        teemo.style.left = Math.floor(Math.random() * maxX) + 'px';
        teemo.style.top = Math.floor(Math.random() * maxY) + 'px';
    }

    function catchTeemo() {
        if (!isPlaying) return;
        score += 10;
        scoreDisplay.innerText = score;
        moveTeemo();
    }

    // 2. 게임이 끝났을 때 점수를 서버로 보내는 로직 추가
    async function endGame() {
        isPlaying = false;
        clearInterval(gameInterval);
        clearInterval(moveInterval);
        teemo.style.display = 'none';

        // 점수가 0점보다 크면 이름을 물어봅니다.
        if (score > 0) {
            const playerName = prompt(`게임 종료! 최종 점수: ${score}점\n명예의 전당에 등록할 닉네임을 입력하세요!`);
            if (playerName && playerName.trim() !== "") {
                // 서버로 POST 요청 보내기!
                await fetch(`/api/scores?playerName=${encodeURIComponent(playerName)}&score=${score}`, {
                    method: 'POST'
                });
                // 저장 후 랭킹 새로고침
                loadRanking();
                alert('명예의 전당에 등록되었습니다!');
            }
        } else {
            alert("0점입니다... 분발하세요! 😢");
        }
    }
</script>
</body>
</html>
